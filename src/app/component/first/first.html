<div class="alert alert-secondary">
  <!-- Binde l'attribut hidden
    avec l'attribut isHidden
  -->
  <p [hidden]="isHidden">Bonjour {{ name }}</p>
  <!-- Quand tu clique sur le boutton
    appelle la méthode showHide
  -->

  <input #myInput (change)="changeMessage(myInput.value)" type="text">
  Le contenu de l'input est: {{message}}
  <button
    (click)="showHide()"
    class="btn btn-danger">
    show/hide
  </button>
  <app-second/>
</div>
